nodes:
  - name: node1
    endpoints:
      - id: 0
        type: udp4
        ip: 127.0.0.1
        port: 11417
      - id: 1
        type: serial
        device: /tmp/ttyNode1
  - name: node2
    endpoints:
      - id: 0
        type: udp4
        ip: 127.0.0.1
        port: 11416
      - id: 1
        type: udp4
        ip: 127.0.0.1
        port: 11418
  - name: node3
    endpoints:
      - id: 0
        type: serial
        device: /tmp/ttyNode3
      - id: 1
        type: udp4
        ip: 127.0.0.1
        port: 11419

connections:
  - first: {node: node1, id: 0}
    second: {node: node2, id: 0}
  - first: {node: node1, id: 1}
    second: {node: node3, id: 0}
  - first: {node: node2, id: 1}
    second: {node: node3, id: 1}

bundles:
  - name: node1_heartbeat
    id: 0x001
    producers: [node1]
    consumers: [node2, node3]
    signals:
      - {name: heartbeat, id: 1, type: uint32}
  - name: node2_heartbeat
    id: 0x002
    producers: [node2]
    consumers: [node1, node3]
    signals:
      - {name: heartbeat, id: 2, type: uint32}
  - name: node3_heartbeat
    id: 0x003
    producers: [node3]
    consumers: [node1, node2]
    signals:
      - {name: heartbeat, id: 3, type: uint32}
  - name: log
    id: 0x100
    producers: [node1]
    consumers: [node2, node3]
    signals:
      - {name: level, id: 0x1000, type: uint32}
      - {name: name, id: 0x1001, type: string, capacity: 64}
      - {name: msg, id: 0x1002, type: string, capacity: 64}
      - {name: file, id: 0x1003, type: string, capacity: 64}
      - {name: function, id: 0x1004, type: string, capacity: 64}
      - {name: line, id: 0x1005, type: uint32}
  - name: node_name
    id: 0x101
    producers: [node2, node3]
    consumers: [node1]
    signals:
      - {name: name, id: 0x1010, type: string, capacity: 64}
  - name: time
    id: 0x102
    producers: [node2]
    consumers: [node3]
    signals:
      - {name: seconds, id: 0x1020, type: int32}
      - {name: nanoseconds, id: 0x1021, type: uint32}
