nodes:
  - name: pc
    heartbeat:
      enabled: true
      period: 1000
    endpoints:
      - id: 0
        type: serial
        device: /tmp/ttyPC
  - name: mcu
    heartbeat:
      enabled: true
      period: 100
    endpoints:
      - id: 0
        type: serial
        device: /tmp/ttyMCU

connections:
  - first: {node: mcu, id: 0}
    second: {node: pc, id: 0}

bundles:
  - name: log
    id: 0x100
    producers: [mcu]
    consumers: [pc]
    signals:
      - {name: level, id: 0x1000, type: uint32}
      - {name: name, id: 0x1001, type: string, capacity: 64}
      - {name: msg, id: 0x1002, type: string, capacity: 64}
      - {name: file, id: 0x1003, type: string, capacity: 64}
      - {name: function, id: 0x1004, type: string, capacity: 64}
      - {name: line, id: 0x1005, type: uint32}
  - name: status
    id: 0x101
    producers: [mcu]
    consumers: [pc]
    signals:
      - {name: header_frame_id, id: 0x1010, type: string, value: mcu_link}
      - {name: hardware_id, id: 0x1011, type: string, capacity: 16}
      - {name: firmware_version, id: 0x1012, type: string, capacity: 32}
      - {name: mcu_uptime_sec, id: 0x1013, type: int32}
      - {name: mcu_uptime_nanosec, id: 0x1014, type: uint32}
      - {name: connection_uptime_sec, id: 0x1015, type: int32}
      - {name: connection_uptime_nanosec, id: 0x1016, type: uint32}
  - name: power
    id: 0x102
    producers: [mcu]
    consumers: [pc]
    signals:
      - {name: header_frame_id, id: 0x1020, type: string, value: mcu_link}
      - {name: shore_power_connected, id: 0x1021, type: int32, value: -1}
      - {name: battery_connected, id: 0x1022, type: int32, value: 1}
      - {name: power_12v_user_nominal, id: 0x1023, type: int32, value: -1}
      - {name: charger_connected, id: 0x1024, type: int32, value: -1}
      - {name: charging_complete, id: 0x1025, type: int32, value: -1}

      - {name: j100_measured_battery, id: 0x1026, type: float}
      - {name: j100_measured_5v, id: 0x1027, type: float}
      - {name: j100_measured_12v, id: 0x1028, type: float}

      - {name: j100_total_current, id: 0x1029, type: float}
      - {name: j100_computer_current, id: 0x102A, type: float}
      - {name: j100_drive_current, id: 0x102B, type: float}
      - {name: j100_user_current, id: 0x102C, type: float}

  - name: emergency_stop
    id: 0x103
    producers: [mcu]
    consumers: [pc]
    signals:
      - {name: data, id: 0x1030, type: bool}
  - name: temperature
    id: 0x104
    producers: [mcu]
    consumers: [pc]
    signals:
      - {name: header_frame_id, id: 0x1040, type: string, value: mcu_link}
      - {name: j100_mcu, id: 0x1041, type: float}
      - {name: j100_pcb, id: 0x1042, type: float}
  - name: stop_status
    id: 0x105
    producers: [mcu]
    consumers: [pc]
    signals:
      - {name: header_frame_id, id: 0x1050, type: string, value: mcu_link}
      - {name: stop_power_status, id: 0x1051, type: bool, value: True}
      - {name: external_stop_present, id: 0x1052, type: bool}
      - {name: needs_reset, id: 0x1053, type: bool, value: False}
  - name: imu
    id: 0x106
    producers: [mcu]
    consumers: [pc]
    signals:
      - {name: header_frame_id, id: 0x1060, type: string, value: imu_0_link}
      - {name: linear_acceleration_x, id: 0x1061, type: double}
      - {name: linear_acceleration_y, id: 0x1062, type: double}
      - {name: linear_acceleration_z, id: 0x1063, type: double}
      - {name: linear_acceleration_covariance, id: 0x1064, type: double, value: 0.03924}
      - {name: angular_velocity_x, id: 0x1065, type: double}
      - {name: angular_velocity_y, id: 0x1066, type: double}
      - {name: angular_velocity_z, id: 0x1067, type: double}
      - {name: angular_velocity_covariance, id: 0x1068, type: double, value: 0.0000010966}
  - name: magnetometer
    id: 0x107
    producers: [mcu]
    consumers: [pc]
    signals:
      - {name: header_frame_id, id: 0x1070, type: string, value: imu_0_link}
      - {name: magnetic_field_x, id: 0x1071, type: double}
      - {name: magnetic_field_y, id: 0x1072, type: double}
      - {name: magnetic_field_z, id: 0x1073, type: double}
      - {name: magnetic_field_covariance, id: 0x1074, type: double, value: -1.0}
  - name: nmea
    id: 0x108
    producers: [mcu]
    consumers: [pc]
    signals:
      - {name: header_frame_id, id: 0x1080, type: string, value: gps_0_link}
      - {name: sentence, id: 0x1081, type: string, capacity: 324}
  - name: motor_feedback
    id: 0x109
    producers: [mcu]
    consumers: [pc]
    signals:
      - {name: header_frame_id, id: 0x1090, type: string, value: mcu_link}
      - {name: left_current, id: 0x1091, type: float}
      - {name: left_bridge_temperature, id: 0x1092, type: float}
      - {name: left_motor_temperature, id: 0x1093, type: float}
      - {name: left_driver_fault, id: 0x1094, type: bool}
      - {name: left_duty_cycle, id: 0x1095, type: float}
      - {name: left_measured_velocity, id: 0x1096, type: float}
      - {name: left_measured_travel, id: 0x1097, type: float}
      - {name: right_current, id: 0x1098, type: float}
      - {name: right_bridge_temperature, id: 0x1099, type: float}
      - {name: right_motor_temperature, id: 0x109A, type: float}
      - {name: right_driver_fault, id: 0x109B, type: bool}
      - {name: right_duty_cycle, id: 0x109C, type: float}
      - {name: right_measured_velocity, id: 0x109D, type: float}
      - {name: right_measured_travel, id: 0x109E, type: float}
      - {name: commanded_mode, id: 0x109F, type: int32}
      - {name: actual_mode, id: 0x10A0, type: int32}

  - name: wifi_connected
    id: 0x200
    producers: [pc]
    consumers: [mcu]
    signals:
      - {name: data, id: 0x2000, type: bool}
  - name: hmi
    id: 0x201
    producers: [pc]
    consumers: [mcu]
    signals:
      - {name: data, id: 0x2010, type: uint32}
  - name: motor_command
    id: 0x202
    producers: [pc]
    consumers: [mcu]
    signals:
      - {name: mode, id: 0x2020, type: int32}
      - {name: left_driver, id: 0x2021, type: float}
      - {name: right_driver, id: 0x2022, type: float}
      - {name: MODE_VELOCITY, id: 0x2023, type: int32, value: 0}
      - {name: MODE_PWM, id: 0x2024, type: int32, value: 1}
      - {name: MODE_NONE, id: 0x2025, type: int32, value: -1}

ros2:
  topics:
    - {topic: /rosout,                          message: rcl_interfaces/msg/Log,                    qos.profile: rosout,       bundle: log}
    - {topic: platform/mcu/status,              message: clearpath_platform_msgs/msg/Status,        qos.profile: sensor_data,  bundle: status}
    - {topic: platform/mcu/status/power,        message: clearpath_platform_msgs/msg/Power,         qos.profile: sensor_data,  bundle: power}
    - {topic: platform/mcu/status/temperature,  message: clearpath_platform_msgs/msg/Temperature,   qos.profile: sensor_data,  bundle: temperature}
    - {topic: platform/mcu/status/stop,         message: clearpath_platform_msgs/msg/StopStatus,    qos.profile: sensor_data,  bundle: stop_status}
    - {topic: platform/emergency_stop,          message: std_msgs/msg/Bool,                         qos.profile: sensor_data,  bundle: emergency_stop}
    - {topic: platform/motors/feedback,         message: clearpath_platform_msgs/msg/Feedback,      qos.profile: sensor_data,  bundle: motor_feedback}
    - {topic: sensors/imu_0/data_raw,           message: sensor_msgs/msg/Imu,                       qos.profile: sensor_data,  bundle: imu}
    - {topic: sensors/imu_0/mag,                message: sensor_msgs/msg/MagneticField,             qos.profile: sensor_data,  bundle: magnetometer}
    - {topic: sensors/gps_0/nmea_sentence,      message: nmea_msgs/msg/Sentence,                    qos.profile: sensor_data,  bundle: nmea}
    - {topic: platform/wifi_connected,          message: std_msgs/msg/Bool,                         qos.profile: sensor_data,  bundle: wifi_connected}
    - {topic: platform/mcu/_hmi,                message: std_msgs/msg/UInt8,                        qos.profile: sensor_data,  bundle: hmi}
    - {topic: platform/motors/cmd_drive,        message: clearpath_platform_msgs/msg/Drive,         qos.profile: sensor_data,  bundle: motor_command}
