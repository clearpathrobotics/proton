name: CMake CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    container:
      image: ubuntu:24.04

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            python3 \
            python3-pip \
            python3-jinja2 \
            python3-yaml \
            python3-protobuf \
            protobuf-compiler \
            libboost-all-dev \
            libyaml-cpp-dev \
            libgtest-dev \
            git

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --parallel

      - name: Run tests
        run: |
          ctest --test-dir build/tests --output-on-failure
