name: Proton CI

on:
  push:
  pull_request:

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    container:
      image: ubuntu:24.04

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git \
            python3 \
            python3-venv \
            python3-pip

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Mark safe repository
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: venv setup
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit
        run: |
          . venv/bin/activate
          pre-commit run --all-files

  test-proton-core:
    runs-on: ubuntu-latest

    container:
      image: ubuntu:24.04

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            python3 \
            python3-pip \
            python3-jinja2 \
            python3-yaml \
            python3-protobuf \
            protobuf-compiler \
            libyaml-cpp-dev \
            nlohmann-json3-dev \
            libgtest-dev \
            git \
            lcov

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure CMake
        run: |
          cmake -B build_core \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            -DPROTON_BUILD_TESTS=ON \
            -DPROTON_ENABLE_TEST_COVERAGE=ON \
            -DPROTON_ENABLE_ALLOC=ON \
            -DPROTON_NODE_BUILDER=ON \
            -DPROTON_NODE_BUILDER_YAML_PARSER=ON \
            -DPROTON_NODE_BUILDER_JSON_PARSER=ON

      - name: Build
        run: |
          cmake --build build_core --parallel

      - name: Run tests
        run: |
          SEED=$(( (${{ github.run_id }} % 99999) + 1 ))
          echo "GTest random seed: $SEED"
          GTEST_SHUFFLE=1 GTEST_RANDOM_SEED=$SEED ctest --schedule-random --test-dir build_core --output-on-failure

      - name: Generate core coverage report
        run: |
          lcov --directory build_core --capture --output-file core_coverage.info --ignore-errors mismatch
          lcov --remove core_coverage.info "*tests/*" "/usr/include/*" "*/_deps/*" --output-file core_coverage.info --ignore-errors unused
          genhtml core_coverage.info --output-directory core_coverage_report --title "Proton Core Code Coverage"

      - name: Generate core coverage summary
        run: |
          lcov --summary core_coverage.info > core_coverage_summary.txt

      - name: Upload core coverage report
        uses: actions/upload-artifact@v7
        with:
          name: core-coverage-report
          path: core_coverage_report/
          retention-days: 30

      - name: Upload core coverage summary
        uses: actions/upload-artifact@v7
        with:
          name: core-coverage-summary
          path: core_coverage_summary.txt
          retention-days: 30

  test-proto-generation:
    runs-on: ubuntu-latest

    container:
      image: ubuntu:24.04

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            python3 \
            python3-pip \
            python3-protobuf \
            protobuf-compiler \
            git

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure CMake with proto generation
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DPROTON_BUILD_TESTS=OFF \
            -DPROTON_GENERATE_PROTOS=ON

      - name: Build proton_core and proton_cpp
        run: |
          cmake --build build --target proton_core proton_cpp --parallel

  test-install:
    runs-on: ubuntu-latest

    container:
      image: ubuntu:24.04

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libyaml-cpp-dev \
            nlohmann-json3-dev \
            git

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure and build
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=20 \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            -DPROTON_BUILD_TESTS=OFF \
            -DPROTON_ENABLE_ALLOC=ON \
            -DPROTON_NODE_BUILDER=ON \
            -DPROTON_NODE_BUILDER_YAML_PARSER=ON \
            -DPROTON_NODE_BUILDER_JSON_PARSER=ON
            -DPROTON_INSTALL=ON
          cmake --build build --parallel

      - name: Install to staging directory
        run: |
          cmake --install build --prefix /tmp/proton-install

      - name: Verify install structure
        run: |
          test -f /tmp/proton-install/lib/libproton_core.a
          test -f /tmp/proton-install/lib/libproton_cpp.a
          test -f /tmp/proton-install/include/proton/registry.h
          test -f /tmp/proton-install/include/proton/generated/signal.pb.h
          test -f /tmp/proton-install/include/protoncpp/node_builder/generator.hpp
          test -f /tmp/proton-install/include/pb.h
          test -f /tmp/proton-install/lib/cmake/proton/protonConfig.cmake

      - name: Test find_package works
        run: |
          mkdir -p /tmp/consumer && cd /tmp/consumer
          cat > CMakeLists.txt << 'EOF'
          cmake_minimum_required(VERSION 3.20)
          project(consumer)
          find_package(proton REQUIRED)
          add_executable(test_consumer main.cpp)
          target_link_libraries(test_consumer proton::proton_cpp)
          EOF
          cat > main.c << 'EOF'
          #include <proton/registry.h>
          #include <protoncpp/node_builder/generator.hpp>
          int main() { return 0; }
          EOF
          cmake -B build -DCMAKE_PREFIX_PATH=/tmp/proton-install
          cmake --build build

  comment-coverage-on-pr:
    if: github.event_name == 'pull_request'
    needs: [test-proton-core]
    runs-on: ubuntu-latest

    steps:
      - name: Download PR head core coverage summary
        uses: actions/download-artifact@v8
        with:
          name: core-coverage-summary
          path: coverage_summaries/head

      - name: Find base workflow run id
        id: find_base_run
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const baseBranch = context.payload.pull_request.base.ref;
            const baseSha = context.payload.pull_request.base.sha;

            let page = 1;
            let runId = '';

            while (true) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: 'ci.yml',
                event: 'push',
                branch: baseBranch,
                per_page: 100,
                page,
              });

              const match = data.workflow_runs.find((run) => run.head_sha === baseSha);
              if (match) {
                runId = String(match.id);
                break;
              }

              if (data.workflow_runs.length < 100) {
                break;
              }
              page += 1;
            }

            core.info(`Base branch: ${baseBranch}`);
            core.info(`Base SHA: ${baseSha}`);
            core.info(`Resolved run ID: ${runId || 'not found'}`);
            core.setOutput('run_id', runId);

      - name: Download base core coverage summary artifact
        if: steps.find_base_run.outputs.run_id != ''
        uses: actions/download-artifact@v8
        with:
          name: core-coverage-summary
          path: coverage_summaries/base
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.find_base_run.outputs.run_id }}

      - name: Build PR coverage comment body
        run: |
          extract_rate() {
            local metric="$1"
            local file="$2"
            if [[ -f "$file" ]]; then
              grep -E "^ *${metric}\\.+:" "$file" | sed -E 's/.*: *([0-9]+(\\.[0-9]+)?)%.*/\1/' | head -1
            else
              echo ""
            fi
          }

          format_percent() {
            local value="$1"
            if [[ -n "$value" ]]; then
              echo "${value}%"
            else
              echo "N/A"
            fi
          }

          format_delta() {
            local head_rate="$1"
            local base_rate="$2"
            if [[ -z "$head_rate" || -z "$base_rate" ]]; then
              echo "N/A"
            else
              awk -v h="$head_rate" -v b="$base_rate" 'BEGIN { d = h - b; if (d > 0) printf("+%.2f", d); else printf("%.2f", d); }'
            fi
          }

          head_core_lines=$(extract_rate lines coverage_summaries/head/core_coverage_summary.txt)
          head_core_funcs=$(extract_rate functions coverage_summaries/head/core_coverage_summary.txt)

          base_core_lines=$(extract_rate lines coverage_summaries/base/core_coverage_summary.txt)
          base_core_funcs=$(extract_rate functions coverage_summaries/base/core_coverage_summary.txt)

          delta_core_lines=$(format_delta "$head_core_lines" "$base_core_lines")
          delta_core_funcs=$(format_delta "$head_core_funcs" "$base_core_funcs")

          {
            echo "<!-- proton-coverage-comment -->"
            echo "## Coverage Summary"
            echo
            echo "| Scope | Base Lines | PR Lines | Delta (pp) | Base Functions | PR Functions | Delta (pp) |"
            echo "|---|---:|---:|---:|---:|---:|---:|"
            echo "| core | $(format_percent "$base_core_lines") | $(format_percent "$head_core_lines") | ${delta_core_lines} | $(format_percent "$base_core_funcs") | $(format_percent "$head_core_funcs") | ${delta_core_funcs} |"
            echo
            echo "Coverage deltas are computed as: PR source branch minus target branch (base commit)."
            echo
            if [[ ! -f coverage_summaries/base/core_coverage_summary.txt ]]; then
              echo "Baseline artifact for the target branch commit was not found, so one or more deltas may be shown as N/A."
              echo
            fi
            echo "Detailed HTML reports are available in the workflow artifacts:"
            echo "- core-coverage-report"
          } > coverage_comment.md

      - name: Create or update PR coverage comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('coverage_comment.md', 'utf8');
            const marker = '<!-- proton-coverage-comment -->';
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

  test-proton-vendor:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

    container:
      image: rostooling/setup-ros-docker:ubuntu-noble-latest

    steps:
      - uses: actions/checkout@v6

      - name: Create proton_vendor repos file
        run: |
          cat > /tmp/proton_vendor.repos <<EOF
          repositories:
            proton_vendor:
              type: git
              url: https://github.com/clearpathrobotics/proton_vendor.git
              version: main
          EOF

      - uses: ros-tooling/action-ros-ci@v0.4
        id: action_ros_ci_step
        with:
          target-ros2-distro: jazzy
          package-name: proton_vendor
          vcs-repo-file-url: file:///tmp/proton_vendor.repos
