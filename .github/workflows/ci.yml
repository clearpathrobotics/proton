name: CMake CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    container:
      image: ubuntu:24.04

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git \
            python3 \
            python3-venv \
            python3-pip

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Mark safe repository
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: venv setup
        run: |
          python3 -m venv venv
          . venv/bin/activate
          pip install --upgrade pip
          pip install pre-commit

      - name: Run pre-commit
        run: |
          . venv/bin/activate
          pre-commit run --all-files

  build-and-test:
    runs-on: ubuntu-latest

    container:
      image: ubuntu:24.04

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            python3 \
            python3-pip \
            python3-jinja2 \
            python3-yaml \
            python3-protobuf \
            protobuf-compiler \
            libboost-all-dev \
            libyaml-cpp-dev \
            libgtest-dev \
            git

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure CMake
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cmake --build build --parallel

      - name: Run tests
        run: |
          ctest --test-dir build/tests --output-on-failure

  test-proton-vendor-jazzy:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

    container:
      image: rostooling/setup-ros-docker:ubuntu-noble-latest

    steps:
      - uses: actions/checkout@v6

      - name: Create proton_vendor repos file
        run: |
          cat > /tmp/proton_vendor.repos <<EOF
          repositories:
            proton_vendor:
              type: git
              url: https://github.com/clearpathrobotics/proton_vendor.git
              version: main
          EOF

      - uses: ros-tooling/action-ros-ci@v0.3
        id: action_ros_ci_step
        with:
          target-ros2-distro: jazzy
          package-name: proton_vendor
          vcs-repo-file-url: file:///tmp/proton_vendor.repos
          extra-cmake-args: -DPROTON_VENDOR_USE_LOCAL=ON
