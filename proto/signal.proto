syntax = "proto3";

package proton;

message Signal {
  uint32 id = 1;

  oneof signal {
    double double_value = 2;
    float float_value = 3;
    int32 int32_value = 4;
    int64 int64_value = 5;
    uint32 uint32_value = 6;
    uint64 uint64_value = 7;
    bool bool_value = 8;
    string string_value = 9;
    bytes bytes_value = 10;
  }
}
