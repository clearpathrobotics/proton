syntax = "proto3";

package proton;

message Signal {
  reserved 10 to 18;
  reserved list_double_value, list_float_value, list_int32_value, list_int64_value;
  reserved list_uint32_value, list_uint64_value, list_bool_value, list_string_value;
  reserved list_bytes_value;

  oneof signal {
    double double_value = 1;
    float float_value = 2;
    int32 int32_value = 3;
    int64 int64_value = 4;
    uint32 uint32_value = 5;
    uint64 uint64_value = 6;
    bool bool_value = 7;
    string string_value = 8;
    bytes bytes_value = 9;
  }
}
